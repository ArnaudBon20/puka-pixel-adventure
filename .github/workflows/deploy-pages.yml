name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Puka's Party
        run: npm run build -- --base=/puka-pixel-adventure/

      - name: Install Garden dependencies
        working-directory: garden-mystery
        run: npm install --no-audit --no-fund

      - name: Build Puka Garden Mystery
        working-directory: garden-mystery
        run: npm run build -- --base=/puka-pixel-adventure/puka-garden-mystery/

      - name: Install Super Bunny dependencies
        working-directory: super-bunny-bros
        run: npm install --no-audit --no-fund

      - name: Build Super Blue Bunny Bros
        working-directory: super-bunny-bros
        run: npm run build -- --base=/puka-pixel-adventure/super-bunny-bros/

      - name: Assemble Pages artifact
        run: |
          rm -rf public-site
          mkdir -p public-site/puka-garden-mystery public-site/super-bunny-bros
          cp -R dist/* public-site/
          cp -R garden-mystery/dist/* public-site/puka-garden-mystery/
          cp -R super-bunny-bros/dist/* public-site/super-bunny-bros/

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public-site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
